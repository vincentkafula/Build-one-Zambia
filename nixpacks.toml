[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = [
  "npm install",
  "cd backend && npm install",
  "cd frontend && npm install"
]

[phases.build]
# Unset VITE_API_URL during build so it isn't baked in.
# The frontend server.js injects window.__API_URL__ at runtime instead,
# which means the same build works on any domain (bozplans.org, railway.app, etc.)
cmds = [
  "cd frontend && VITE_API_URL='' npm run build"
]

[start]
cmd = "node start.js"
